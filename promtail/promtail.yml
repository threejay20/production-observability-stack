# ============================================================
# Promtail configuration — ships container and system logs to Loki
# ============================================================

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchsize: 1048576     # 1 MB
    batchwait: 1s
    timeout: 10s

scrape_configs:

  # ---- Docker container logs via journal ----
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: status
            values: ["running"]
    relabel_configs:
      # Use container name as job label
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'job'

      # Map container image tag to version label
      - source_labels: ['__meta_docker_container_image']
        target_label: 'image'

      # Add compose service name if available
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'

      # Add compose project name
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'compose_project'

      # Drop Promtail's own logs to avoid feedback loop
      - source_labels: ['__meta_docker_container_name']
        regex: '.*promtail.*'
        action: drop

    pipeline_stages:
      # Attempt to parse JSON structured logs
      - json:
          expressions:
            level:     level
            timestamp: timestamp
            message:   message
            service:   service
            version:   version

      # If JSON parsing found a level, use it as a label
      - labels:
          level:
          service:
          version:

      # Normalize log level to lowercase
      - replace:
          expression: '(WARN|WARNING)'
          replace: 'warn'
          source: level

      - replace:
          expression: '(ERR|ERROR|FATAL|CRITICAL)'
          replace: 'error'
          source: level

      # Timestamp from parsed JSON if available
      - timestamp:
          format: RFC3339Nano
          source: timestamp
          action_on_failure: skip

  # ---- System logs (/var/log) ----
  - job_name: system-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          __path__: /var/log/{syslog,kern.log,auth.log,messages}

    pipeline_stages:
      - match:
          selector: '{job="system"}'
          stages:
            - regex:
                expression: '^(?P<timestamp>\w{3}\s+\d{1,2}\s+\d{2}:\d{2}:\d{2})\s+(?P<host>\S+)\s+(?P<process>[^:]+):\s+(?P<message>.*)$'
            - labels:
                host:
                process:
